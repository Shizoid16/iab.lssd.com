<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пользователи</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <!-- Same header as index.html -->
    </header>

    <main class="users-management">
        <h1 class="section-title">Управление Пользователями</h1>
        
        <div class="user-controls">
            <button class="btn" id="addUserBtn"><i class="fas fa-user-plus"></i> Добавить пользователя</button>
            <div class="user-filters">
                <select id="userRoleFilter">
                    <option value="all">Все роли</option>
                    <option value="owner">Владелец</option>
                    <option value="admin">Администратор</option>
                    <option value="moderator">Модератор</option>
                    <option value="user">Пользователь</option>
                </select>
                <input type="text" id="userSearch" placeholder="Поиск пользователей...">
            </div>
        </div>
        
        <div class="users-list">
            <div class="user-item">
                <div class="user-avatar">
                    <i class="fas fa-crown"></i>
                </div>
                <div class="user-info">
                    <h3>Иванов Иван (Владелец)</h3>
                    <p>Дата регистрации: 01.01.2025</p>
                </div>
                <div class="user-actions">
                    <button class="btn btn-sm"><i class="fas fa-edit"></i> Редактировать</button>
                    <button class="btn btn-sm btn-danger"><i class="fas fa-trash"></i> Удалить</button>
                </div>
            </div>
            
            <div class="user-item">
                <div class="user-avatar">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <div class="user-info">
                    <h3>Петров Петр (Администратор)</h3>
                    <p>Дата регистрации: 05.01.2025</p>
                </div>
                <div class="user-actions">
                    <button class="btn btn-sm"><i class="fas fa-edit"></i> Редактировать</button>
                    <button class="btn btn-sm btn-danger"><i class="fas fa-trash"></i> Удалить</button>
                </div>
            </div>
            
            <div class="user-item">
                <div class="user-avatar">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div class="user-info">
                    <h3>Сидорова Анна (Модератор)</h3>
                    <p>Дата регистрации: 10.01.2025</p>
                </div>
                <div class="user-actions">
                    <button class="btn btn-sm"><i class="fas fa-edit"></i> Редактировать</button>
                    <button class="btn btn-sm btn-danger"><i class="fas fa-trash"></i> Удалить</button>
                </div>
            </div>
            
            <div class="user-item">
                <div class="user-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="user-info">
                    <h3>Козлов Дмитрий (Пользователь)</h3>
                    <p>Дата регистрации: 15.01.2025</p>
                </div>
                <div class="user-actions">
                    <button class="btn btn-sm"><i class="fas fa-edit"></i> Редактировать</button>
                    <button class="btn btn-sm btn-danger"><i class="fas fa-trash"></i> Удалить</button>
                </div>
            </div>
        </div>
        
        <!-- User Edit Modal -->
        <div class="modal" id="userEditModal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Редактирование пользователя</h2>
                <form id="userEditForm">
                    <div class="form-group">
                        <label for="editUsername">Логин:</label>
                        <input type="text" id="editUsername" required>
                    </div>
                    <div class="form-group">
                        <label for="editFullname">Полное имя:</label>
                        <input type="text" id="editFullname" required>
                    </div>
                    <div class="form-group">
                        <label for="editEmail">Email:</label>
                        <input type="email" id="editEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="editRole">Роль:</label>
                        <select id="editRole" required>
                            <option value="owner">Владелец</option>
                            <option value="admin">Администратор</option>
                            <option value="moderator">Модератор</option>
                            <option value="user">Пользователь</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editPosition">Должность:</label>
                        <input type="text" id="editPosition">
                    </div>
                    <div class="form-group">
                        <label for="editAvatar">Аватар:</label>
                        <input type="file" id="editAvatar">
                    </div>
                    <button type="submit" class="btn">Сохранить изменения</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <!-- Same footer as index.html -->
    </footer>

    <script src="js/main.js"></script>
    <script src="js/users.js"></script>
</body>
</html>
